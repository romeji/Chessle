<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#7C6EF0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ChessQuest">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icons/chessquest-logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<title>ChessQuest — S'entraîner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/entrainement.css">
</head>
<body data-page="play">
<div id="toast-container"></div>
<div class="app">
  <section class="page">
    <div class="entrainement-header">
      <a class="subpage-back entrainement-home" href="index.html" aria-label="Retour a l'accueil">
        <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
      </a>
      <div class="entrainement-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="#fff"/></svg>
      </div>
      <div>
        <h1 class="entrainement-title">S'entraîner</h1>
        <p class="entrainement-sub">Choisis ton entraînement</p>
      </div>
    </div>

    <div class="entrainement-list">
      <a class="entrainement-card" href="learn.html">
        <div class="ec-icon ec-red">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="#fff"/></svg>
        </div>
        <div class="ec-text">
          <div class="ec-title">Entraînement ciblé</div>
          <div class="ec-desc">Travaille un aspect précis</div>
        </div>
        <svg class="ec-chevron" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <a class="entrainement-card" href="training-game.html">
        <div class="ec-icon ec-dark">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M12 2a2.5 2.5 0 0 0-2 4 4 4 0 0 0-1.6 5.4C7.2 12.4 6 14.2 6 17h12c0-2.8-1.2-4.6-2.4-5.6A4 4 0 0 0 14 6a2.5 2.5 0 0 0-2-4Z"/><rect x="5" y="19" width="14" height="3" rx="1"/></svg>
        </div>
        <div class="ec-text">
          <div class="ec-title">Parties d'entraînement</div>
          <div class="ec-desc">Joue et apprends</div>
        </div>
        <svg class="ec-chevron" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <a class="entrainement-card" href="puzzles.html">
        <div class="ec-icon ec-orange">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M20.5 11.5c0 1.4-1.1 2.3-2.3 2.3-.4 0-.8-.1-1.1-.3-.3.7-1 1.2-1.8 1.2-1.1 0-2-.9-2-2 0-.3.1-.6.2-.8-.9-.1-1.5-.9-1.5-1.8 0-.5.2-.9.5-1.2-.6-.3-1-.9-1-1.6 0-1.1.9-2 2-2 .3 0 .6.1.8.2C14.6 4.2 15.1 3.5 16 3.5c1.1 0 2 .9 2 2 0 .2 0 .4-.1.6.8.3 1.4 1.1 1.4 2 0 .5-.2 1-.5 1.3.9.3 1.5 1.2 1.7 2.1Z"/></svg>
        </div>
        <div class="ec-text">
          <div class="ec-title">Défis quotidiens</div>
          <div class="ec-desc">Nouveaux défis chaque jour</div>
        </div>
        <svg class="ec-chevron" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <div class="entrainement-card disabled">
        <div class="ec-icon ec-gold">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 5M17 5h3a3 3 0 0 1-3 5"/></svg>
        </div>
        <div class="ec-text">
          <div class="ec-title">Tournois</div>
          <div class="ec-desc">Affronte d'autres joueurs</div>
        </div>
        <span class="ec-soon">Bientôt</span>
      </div>
    </div>
  </section>

  <nav class="tabbar">
    <button class="tabbar-item" data-tab="home" data-href="index.html">
      <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg><span>Accueil</span>
    </button>
    <button class="tabbar-item" data-tab="learn" data-href="learn.html">
      <svg viewBox="0 0 24 24" class="tabicon"><path d="M4 19V6a2 2 0 0 1 2-2h6v16H6a2 2 0 0 0-2 2Z"/><path d="M20 19V6a2 2 0 0 0-2-2h-6v16h6a2 2 0 0 1 2 2Z"/></svg><span>Parcours</span>
    </button>
    <button class="tabbar-item active" data-tab="play" data-href="entrainement.html">
      <svg viewBox="0 0 24 24" class="tabicon"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg><span>Jouer</span>
    </button>
    <button class="tabbar-item" data-tab="progress" data-href="progress.html">
      <svg viewBox="0 0 24 24" class="tabicon"><path d="M4 20V10M11 20V4M18 20v-7"/></svg><span>Progrès</span>
    </button>
    <button class="tabbar-item" data-tab="profile" data-href="profile.html">
      <svg viewBox="0 0 24 24" class="tabicon"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profil</span>
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/chesscom.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
</body>
</html>
