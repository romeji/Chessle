<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChessQuest — Apprendre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/learn.css">
</head>
<body data-page="learn" class="opening-map-page">
<div id="toast-container"></div>
<div class="app map-app">
  <section class="page">
    <div class="teal-hero">
      <div class="subpage-header on-color" style="margin-bottom:2px;">
        <a class="subpage-back" href="index.html"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></a>
        <span class="subpage-title" style="font-size:1.05rem;">Apprendre</span>
        <span class="subpage-badge">
          <svg viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 12L2 9Z"/><path d="M2 9h20M9 3l-2 6 5 12 5-12-2-6"/></svg>
          <span id="learn-gem-count">0</span>
        </span>
      </div>
      <h2 class="teal-title">Ouvertures</h2>
      <p class="teal-sub">Choisis ton répertoire et deviens imbattable !</p>
      <div class="skill-path" id="skill-path"></div>
    </div>

    <input class="search-input" id="opening-search" type="text" placeholder="Rechercher une ouverture… (ex : Najdorf, Londres, Caro-Kann)">
    <div class="opening-groups" id="opening-groups"></div>
    <p class="section-sub" style="margin-top:14px;">Touche une ouverture pour l'ouvrir dans <a href="openings.html" style="color:var(--coral);font-weight:600;">S'entraîner</a>.</p>
  </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.4/confetti.min.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/chesscom.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/board.js"></script>
<script src="assets/js/openings.js"></script>
<script>
const SKILL_ICON_CHECK = '<svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg>';
const SKILL_ICON_TROPHY_SM = '<svg viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 4M17 5h3a3 3 0 0 1-3 4"/><path d="M12 14v3M9 20h6l-1-3H10l-1 3Z"/></svg>';
const SKILL_ICON_LOCK = '<svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';

function renderSkillPath(){
  const el = document.getElementById('skill-path');
  const mastered = PROGRESS.mastered || {};
  const path = ['italienne','quatre_cavaliers','ecossaise','vienne','espagnole','gambit_roi','londres','colle','qgd','qga','slav','anglaise','reti','francaise','carokann','scandinave','pirc','alekhine','indienne_roi','nimzo_indienne','grunfeld','najdorf','dragon','sveshnikov'];
  const island = (key, index) => {
    const unlocked = index === 0 || !!mastered[path[index - 1]];
    const status = mastered[key] ? 'done' : (unlocked ? 'current' : 'locked');
    const title = OPENINGS[key].name.replace('Sicilienne — ','').replace('Gambit Dame — ','');
    const position = `--top:${index * 205 + 20}px;--side:${index % 2 ? 'right' : 'left'};`;
    const inner = `<span class="island-ground"><span class="island-rock"></span><span class="island-tree tree-a"></span><span class="island-tree tree-b"></span><span class="island-piece">${unlocked?'♜':'🔒'}</span></span><span class="map-label">${escapeHtml(title)}</span><span class="map-state">${mastered[key]?'Maîtrisée':(unlocked?'À apprendre':'Verrouillée')}</span>`;
    return unlocked ? `<a class="map-island ${status} side-${index % 2 ? 'right' : 'left'}" style="${position}" href="openings.html?opening=${key}">${inner}</a>` : `<span class="map-island ${status} side-${index % 2 ? 'right' : 'left'}" style="${position}" aria-label="${escapeHtml(title)} verrouillée">${inner}</span>`;
  };
  el.style.setProperty('--map-height', `${path.length * 205 + 115}px`);
  el.innerHTML = `<div class="map-nodes">${path.map(island).join('')}</div>`;
  document.getElementById('learn-gem-count').textContent = PROGRESS.xp || 0;
}

function renderOpeningGroups(){
  const container = document.getElementById('opening-groups');
  const mastered = PROGRESS.mastered || {};
  container.innerHTML = CATEGORIES.map(cat => `
    <details class="opening-category" ${cat.key==='favorites' ? 'open' : ''}>
      <summary>${escapeHtml(cat.title)}</summary>
      <div class="opening-buttons">
        ${cat.lines.map(key => {
          const o = OPENINGS[key];
          const check = mastered[key] ? '<span class="mastery-badge-inline">\u2713</span>' : '';
          return `<a class="line-btn" href="openings.html?opening=${key}"><span>${escapeHtml(o.name)}${check}</span><span class="n-moves">${o.moves.length} demi-coups</span></a>`;
        }).join('')}
      </div>
    </details>
  `).join('');
}

document.getElementById('opening-search').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  document.querySelectorAll('#opening-groups details.opening-category').forEach(details => {
    let visibleCount = 0;
    details.querySelectorAll('.line-btn').forEach(btn => {
      const name = btn.querySelector('span').textContent.toLowerCase();
      const match = q === '' || name.includes(q);
      btn.classList.toggle('hidden', !match);
      if(match) visibleCount++;
    });
    details.classList.toggle('hidden', visibleCount === 0);
    if(q !== '' && visibleCount > 0) details.open = true;
  });
});

renderSkillPath();
renderOpeningGroups();
</script>
</body>
</html>
