<body data-page="profile">
<div id="toast-container"></div>
<div class="app">
  <section class="page">
    <div class="lesson-header">
      <a class="lesson-back" href="profile.html"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--navy)" stroke-width="2.4"><path d="M15 5l-7 7 7 7"/></svg></a>
      <div class="lesson-title">Réglages</div>
    </div>

    <label class="field-label">Compte Chess.com</label>
    <div class="btn-row" style="margin:10px 0 6px;">
      <input type="text" id="chesscom-username" placeholder="pseudo Chess.com" style="flex:1;min-width:150px;">
      <button class="btn secondary" id="save-chesscom">Synchroniser</button>
    </div>
    <p class="section-sub" id="chesscom-status">Les parties publiques sont conservées sur cet appareil et actualisées lorsque l’app est ouverte.</p>

    <label class="field-label">Vitesse du moteur d'analyse</label>
    <div class="segmented" id="engine-speed-picker" style="margin:10px 0 6px;">
      <button data-speed="fast">Rapide</button>
      <button data-speed="normal" class="active">Normal</button>
      <button data-speed="deep">Approfondi</button>
    </div>
    <p class="section-sub" id="engine-speed-hint">~0,45 s par coup — bon équilibre vitesse/précision.</p>

    <label class="field-label">Effets sonores</label>
    <div style="margin:10px 0 20px;"><button class="tts-btn active" id="sound-toggle">Sons activés</button></div>

    <label class="field-label">Voix de lecture</label>
    <select id="voice-select" class="search-input" style="margin:10px 0;"></select>
    <div class="btn-row" style="margin-bottom:6px;">
      <button class="btn secondary" id="voice-test-btn">Tester la voix</button>
    </div>
    <p class="section-sub">La qualité dépend des voix françaises installées sur ton appareil.</p>

    <button class="btn secondary" id="reset-progress-btn" style="margin-top:10px;">Réinitialiser ma progression</button>
  </section>
</div>

<nav class="tabbar">

  </button>

  </button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/chesscom.js"></script>
<script src="assets/js/firebase-sync.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script>
const chessComInput = document.getElementById('chesscom-username');
const chessComStatus = document.getElementById('chesscom-status');
chessComInput.value = chessComState().username || (PROGRESS.settings||{}).chessComUsername || 'romeji';
document.getElementById('save-chesscom').onclick = async () => {
  const username = chessComInput.value.trim();
  chessComStatus.textContent = 'Synchronisation en cours…';
  registerChessComUsername(username); // best-effort, pour l'analyse en arrière-plan (voir SETUP-BACKEND.md)
  try {
    const games = await syncChessCom(username);
    chessComStatus.textContent = `${games.length} parties publiques enregistrées. Les nouvelles parties seront recherchées toutes les 5 minutes tant que l’app est ouverte, et analysées en arrière-plan même app fermée si le backend est configuré (voir SETUP-BACKEND.md).`;
  } catch(error) { chessComStatus.textContent = error.message || 'Synchronisation impossible.'; }
};

const ENGINE_SPEED_HINTS = {
  fast:"~0,25 s par coup — analyse plus rapide, un peu moins précise.",
  normal:"~0,45 s par coup — bon équilibre vitesse/précision.",
  deep:"~0,9 s par coup — plus précis, plus lent."
};
document.querySelectorAll('#engine-speed-picker button').forEach(b=>{
  b.classList.toggle('active', b.dataset.speed === PROGRESS.settings.engineSpeed);
  b.onclick = function(){
    document.querySelectorAll('#engine-speed-picker button').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    PROGRESS.settings.engineSpeed = this.dataset.speed;
    document.getElementById('engine-speed-hint').textContent = ENGINE_SPEED_HINTS[this.dataset.speed] || '';
    saveProgress();
  };
});

const soundBtn = document.getElementById('sound-toggle');
soundBtn.classList.toggle('active', soundEnabled);
soundBtn.textContent = soundEnabled ? 'Sons activés' : 'Sons coupés';
soundBtn.onclick = function(){
  soundEnabled = !soundEnabled;
  PROGRESS.settings.soundEnabled = soundEnabled;
  saveProgress();
  this.classList.toggle('active', soundEnabled);
  this.textContent = soundEnabled ? 'Sons activés' : 'Sons coupés';
};

function populateVoiceSelect(){
  const sel = document.getElementById('voice-select');
  if(!('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith('fr'));
  if(voices.length === 0){ sel.innerHTML = '<option>Aucune voix française détectée</option>'; return; }
  const currentName = frenchVoice ? frenchVoice.name : '';
  sel.innerHTML = voices.map(v => `<option value="${escapeHtml(v.name)}" ${v.name===currentName?'selected':''}>${escapeHtml(v.name)}${v.localService?' (locale)':''}</option>`).join('');
}
if('speechSynthesis' in window){
  populateVoiceSelect();
  window.speechSynthesis.addEventListener('voiceschanged', populateVoiceSelect);
}
document.getElementById('voice-select').addEventListener('change', function(){
  PROGRESS.settings.voiceName = this.value;
  saveProgress();
  refreshVoiceChoice();
  speak("Voici comment sonne cette voix.");
});
document.getElementById('voice-test-btn').onclick = () => speak("Bien joué ! Cavalier d6, échec — la dame est maintenant attaquée.");

document.getElementById('reset-progress-btn').onclick = function(){
  if(!confirm('Réinitialiser toute ta progression ? Cette action est irréversible.')) return;
  PROGRESS = defaultProgress();
  saveProgress();
  alert('Progression réinitialisée.');
  location.href = 'profile.html';
};
</script>
</body>
</html>
