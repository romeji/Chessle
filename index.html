<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChessQuest — Accueil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/home.css">
</head>
<body data-page="home">
<div id="toast-container"></div>

<div id="onboarding-overlay" class="onboarding-overlay hidden">
  <div class="landing-card">
    <h1 class="landing-title">Chess<span class="accent">y</span></h1>
    <p class="landing-tagline">Apprends. Progresse. Deviens un champion !</p>
    <button class="btn landing-btn" id="onboarding-close-btn">Commencer l'aventure</button>
    <button class="landing-skip" id="onboarding-skip-btn">J'ai déjà un compte</button>
  </div>
</div>

<div class="app">
  <section class="page">
    <div class="home-topbar">
      <div class="home-greeting" id="home-greeting">Salut, Champion !</div>
      <div class="home-hero-stats">
        <div class="home-chip">
          <svg viewBox="0 0 24 24" class="chip-icon flame"><path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c1 1 2 2.5 2 4.5A5 5 0 0 1 7 17c0-3 1.5-4 2-6-1 0-3 1-3 3.5A7.5 7.5 0 0 0 12 22a7.5 7.5 0 0 0 7.5-7.5C19.5 8 15 6 12 2Z"/></svg>
          <span id="home-streak">0</span>
        </div>
        <div class="home-chip gem">
          <svg viewBox="0 0 24 24" class="chip-icon gem-icon"><path d="M6 3h12l4 6-10 12L2 9Z"/><path d="M2 9h20M9 3l-2 6 5 12 5-12-2-6"/></svg>
          <span id="home-xp">0</span>
        </div>
      </div>
    </div>
    <div class="home-sub">Ton prochain coup commence ici.</div>

    <div class="home-goal-card">
      <div class="home-goal-info">
        <span class="home-goal-label">Ton objectif du jour</span>
        <div class="home-goal-text" id="home-goal-text">Chargement…</div>
        <div class="track"><div class="track-fill" id="home-goal-fill"></div></div>
      </div>
      <div class="home-goal-mascot">
        <img src="19fdc0d2-bb6f-4256-ab19-994bf666158c.png" alt="Mascotte magicien ChessQuest" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <svg style="display:none;" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#7C6EF0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="#7C6EF0"/></svg>
      </div>
    </div>

    <div class="home-tiles">
      <a class="home-tile tile-purple" href="learn.html">
        <svg viewBox="0 0 24 24" class="home-tile-icon"><path d="M4 19V6a2 2 0 0 1 2-2h13v14H6a2 2 0 0 0-2 2Zm0 0a2 2 0 0 0 2 2h13"/></svg>
        <span>Apprendre</span>
      </a>
      <a class="home-tile tile-green" href="entrainement.html">
        <svg viewBox="0 0 24 24" class="home-tile-icon"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
        <span>S'entraîner</span>
      </a>
      <a class="home-tile tile-orange" href="puzzles.html">
        <svg viewBox="0 0 24 24" class="home-tile-icon"><path d="M14 3v3a2 2 0 0 0 2 2h3M9 21H6a2 2 0 0 1-2-2v-3M4 9V6a2 2 0 0 1 2-2h3m7 17h3a2 2 0 0 0 2-2v-3"/><circle cx="12" cy="12" r="2.5"/></svg>
        <span>Puzzles</span>
      </a>
      <a class="home-tile tile-blue" href="analysis.html">
        <svg viewBox="0 0 24 24" class="home-tile-icon"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.8-4.8"/></svg>
        <span>Analyser</span>
      </a>
    </div>

    <div class="home-section-head">
      <h2 class="home-section-title">Ton parcours</h2>
      <a class="link-btn" href="profile.html">Voir tout</a>
    </div>
    <a class="home-path-card" href="learn.html" style="text-decoration:none;">
      <div class="home-path-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#6C5CE0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 4M17 5h3a3 3 0 0 1-3 4"/><path d="M12 14v3M9 20h6l-1-3H10l-1 3Z"/></svg>
      </div>
      <div class="home-path-info">
        <div class="home-path-title" id="home-path-title">Ouvertures : Débutant</div>
        <div class="track"><div class="track-fill" id="home-path-fill"></div></div>
      </div>
      <div class="home-path-count" id="home-path-count">0/24</div>
    </a>

    <div class="home-week-card">
      <div class="home-week-label">Série en cours <span id="home-week-streak">0 jours</span></div>
      <div class="home-week-strip" id="home-week-strip"></div>
    </div>
  </section>
</div>

<nav class="tabbar">
  <button class="tabbar-item" data-tab="home" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>
    <span>Accueil</span>
  </button>
  <button class="tabbar-item" data-tab="learn" onclick="location.href='learn.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="6" cy="19" r="2.5"/><circle cx="12" cy="11" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M6 16.5V13a2 2 0 0 1 2-2h1.5M14.5 9H16a2 2 0 0 0 2-2V5.5"/></svg>
    <span>Parcours</span>
  </button>
  <button class="tabbar-item" data-tab="play" onclick="location.href='entrainement.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M12 3v3m-3 0h6M8 9h8l-1 4H9L8 9Z"/><path d="M7 20l1.5-7h7L17 20Z"/><path d="M6 20h12"/></svg>
    <span>Jouer</span>
  </button>
  <button class="tabbar-item" data-tab="progress" onclick="location.href='progress.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 15l4-5 3 3 5-7"/></svg>
    <span>Progrès</span>
  </button>
  <button class="tabbar-item" data-tab="profile" onclick="location.href='profile.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"/></svg>
    <span>Profil</span>
  </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/chesscom.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script>
function renderHomeTab(){
  const greetings = ['Salut, Champion !', 'Prêt pour la revanche ?', 'Content de te revoir !', 'On progresse aujourd\u2019hui ?', 'Bienvenue de retour !'];
  document.getElementById('home-greeting').textContent = greetings[dayOfYear() % greetings.length];
  document.getElementById('home-streak').textContent = computeCurrentStreak();
  document.getElementById('home-xp').textContent = PROGRESS.xp || 0;

  ensureDailyProgressFresh();
  const challenge = todayChallenge();
  const current = Math.min(challenge.target, PROGRESS.dailyProgress[challenge.type] || 0);
  document.getElementById('home-goal-text').textContent = `${challenge.text} (${current}/${challenge.target})`;
  document.getElementById('home-goal-fill').style.width = Math.round((current/challenge.target)*100) + '%';

  const totalTrainable = 24;
  const masteredCount = Object.keys(PROGRESS.mastered || {}).length;
  document.getElementById('home-path-title').textContent = `Ouvertures : ${levelTitle(levelFromXp(PROGRESS.xp||0))}`;
  document.getElementById('home-path-fill').style.width = Math.round((masteredCount/totalTrainable)*100) + '%';
  document.getElementById('home-path-count').textContent = `${masteredCount}/${totalTrainable}`;

  const streak = computeCurrentStreak();
  document.getElementById('home-week-streak').textContent = `${streak} jour${streak>1?'s':''}`;
  const dayLabels = ['L','M','M','J','V','S','D'];
  const dates = new Set(PROGRESS.activityDates || []);
  const todayDow = (new Date().getDay() + 6) % 7;
  let html = '';
  for(let i=0;i<7;i++){
    const offset = todayDow - i;
    const active = offset >= 0 ? dates.has(dateKeyOffset(offset)) : false;
    html += `<div class="home-week-day ${active?'done':''} ${offset===0?'today':''}"><span class="wd-dot">${active?'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l6 6L20 6"/></svg>':''}</span><span class="wd-label">${dayLabels[i]}</span></div>`;
  }
  document.getElementById('home-week-strip').innerHTML = html;
}
document.querySelectorAll('.home-tile, .link-btn, .home-path-card').forEach(el=>{});
renderHomeTab();
</script>
</body>
</html>
