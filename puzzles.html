<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<body data-page="puzzles">
<div id="toast-container"></div>
<div class="app">
  <section class="page">
    <a class="subpage-back" href="index.html" style="margin-bottom:16px;">
      <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
    </a>

    <div class="board-frame" style="margin:0 auto 20px;display:block;width:fit-content;">
      <div class="coord-ranks" id="puzzle-ranks"></div>
      <div id="puzzle-board"></div>
      <div class="coord-files" id="puzzle-files"></div>
    </div>

    <div class="mcq-options" id="mcq-options"></div>
  </section>
</div>

<nav class="tabbar">
  <button class="tabbar-item" data-tab="home" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg><span>Accueil</span>
  </button>
  <button class="tabbar-item" data-tab="learn" onclick="location.href='learn.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="6" cy="19" r="2.5"/><circle cx="12" cy="11" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M6 16.5V13a2 2 0 0 1 2-2h1.5M14.5 9H16a2 2 0 0 0 2-2V5.5"/></svg><span>Parcours</span>
  </button>
  <button class="tabbar-item" data-tab="play" onclick="location.href='entrainement.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M12 3v3m-3 0h6M8 9h8l-1 4H9L8 9Z"/><path d="M7 20l1.5-7h7L17 20Z"/><path d="M6 20h12"/></svg><span>Jouer</span>
  </button>
  <button class="tabbar-item" data-tab="progress" onclick="location.href='progress.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 15l4-5 3 3 5-7"/></svg><span>Progrès</span>

  <button class="tabbar-item" data-tab="profile" onclick="location.href='profile.html'">

  </button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<script>
ensurePuzzleBoard();
watchBoardResize('puzzle-board', () => puzzleBoard, '.page');
</script>
