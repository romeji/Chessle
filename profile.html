<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/layout.css">

<body data-page="profile">
<div id="toast-container"></div>
<div class="app">
  <section class="page">
    <div class="profile-header">
      <img class="profile-avatar" src="379fd17e-d8be-4a0f-a913-57bebd14baa2.png" alt="Avatar du joueur">
      <div>
        <div class="profile-name" id="profile-name">romeji</div>
        <div class="profile-level-title" id="profile-level-title">Novice</div>
        <div class="track" style="width:160px;"><div class="track-fill" id="profile-xp-fill"></div></div>
      </div>
      <a href="settings.html" class="profile-settings-btn" style="margin-left:auto;">
        <svg viewBox="0 0 24 24"><path d="M10.3 3.2c.4-1.6 2.7-1.6 3.1 0l.2.9c.2.9 1.2 1.4 2 1l.8-.4c1.4-.7 2.9.8 2.2 2.2l-.4.8c-.4.9.1 1.9 1 2l.9.2c1.6.4 1.6 2.7 0 3.1l-.9.2c-.9.2-1.4 1.2-1 2l.4.8c.7 1.4-.8 2.9-2.2 2.2l-.8-.4c-.9-.4-1.9.1-2 1l-.2.9c-.4 1.6-2.7 1.6-3.1 0l-.2-.9c-.2-.9-1.2-1.4-2-1l-.8.4c-1.4.7-2.9-.8-2.2-2.2l.4-.8c.4-.9-.1-1.9-1-2l-.9-.2c-1.6-.4-1.6-2.7 0-3.1l.9-.2c.9-.2 1.4-1.2 1-2l-.4-.8c-.7-1.4.8-2.9 2.2-2.2l.8.4c.9.4 1.9-.1 2-1l.2-.9Z"/><circle cx="12" cy="12" r="3.2"/></svg>
      </a>
    </div>

    <div class="daily-card">
      <div class="daily-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#B7861A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="#B7861A"/></svg>
      </div>
      <div class="daily-info">
        <div class="daily-label">Défi du jour</div>
        <div class="daily-text" id="daily-text">Chargement…</div>
        <div class="track"><div class="track-fill" id="daily-fill"></div></div>
      </div>
      <div class="daily-check" id="daily-check"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></div>
    </div>

    <div class="streak-card">
      <svg viewBox="0 0 24 24" class="streak-flame" fill="#FFA53D"><path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c1 1 2 2.5 2 4.5A5 5 0 0 1 7 17c0-3 1.5-4 2-6-1 0-3 1-3 3.5A7.5 7.5 0 0 0 12 22a7.5 7.5 0 0 0 7.5-7.5C19.5 8 15 6 12 2Z"/></svg>
      <div class="streak-info">
        <div class="streak-number" id="streak-number">0</div>
        <div class="streak-label">jour(s) de série</div>
      </div>
      <div class="streak-calendar" id="streak-calendar"></div>
    </div>

    <div class="stats-row" id="progress-stats" style="margin-bottom:26px;"></div>

    <h2 class="section-title">Badges</h2>
    <div class="badges-row" id="badges-row"></div>

    <h2 class="section-title">Objectifs</h2>
    <p class="section-sub">Suis ces étapes dans l'ordre pour progresser efficacement.</p>
    <div class="path-list" id="path-list"></div>

    <h2 class="section-title">Ouvertures maîtrisées</h2>
    <p class="section-sub">Touche une case pour t'entraîner directement dessus.</p>
    <div class="mastery-grid" id="mastery-grid"></div>

    <h2 class="section-title">Historique des analyses</h2>
    <div id="games-history"></div>
  </section>
</div>

<nav class="tabbar">
  <button class="tabbar-item" data-tab="home" data-href="index.html">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg><span>Accueil</span>
  </button>
  <button class="tabbar-item" data-tab="learn" data-href="learn.html">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="6" cy="19" r="2.5"/><circle cx="12" cy="11" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M6 16.5V13a2 2 0 0 1 2-2h1.5M14.5 9H16a2 2 0 0 0 2-2V5.5"/></svg><span>Parcours</span>
  </button>
  <button class="tabbar-item" data-tab="play" data-href="entrainement.html">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M12 3v3m-3 0h6M8 9h8l-1 4H9L8 9Z"/><path d="M7 20l1.5-7h7L17 20Z"/><path d="M6 20h12"/></svg><span>Jouer</span>
  </button>
  <button class="tabbar-item" data-tab="progress" data-href="progress.html">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 15l4-5 3 3 5-7"/></svg><span>Progrès</span>
  </button>
  <button class="tabbar-item" data-tab="profile" data-href="profile.html">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"/></svg><span>Profil</span>
  </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/chesscom.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/openings.js"></script>
<script>
function renderPathList(){
  const totalTrainable = trainableKeys().length;
  const masteredCount = Object.keys(PROGRESS.mastered).length;
  const steps = [
    { title:"Découvre la notation", desc:"Onglet Progrès puis Réglages", done: PROGRESS.viewedNotationGuide },
    { title:"Résous ton premier puzzle", desc:"Onglet Puzzles", done: PROGRESS.puzzlesSolved >= 1, href:'puzzles.html' },
    { title:"Maîtrise une ouverture", desc:"Termine une ligne sans erreur", done: masteredCount >= 1, href:'learn.html' },
    { title:"Analyse ta première partie", desc:"Colle un PGN ou récupère-en un", done: PROGRESS.games.length >= 1, href:'analysis.html' },
    { title:"Tiens une série de 3 jours", desc:"Reviens t'entraîner 3 jours de suite", done: computeCurrentStreak() >= 3 },
    { title:"Résous 10 puzzles", desc:"Deviens un vrai tacticien", done: PROGRESS.puzzlesSolved >= 10, href:'puzzles.html' },
    { title:"Maîtrise 5 ouvertures", desc:"Construis ton répertoire", done: masteredCount >= 5, href:'learn.html' }
  ];
  document.getElementById('path-list').innerHTML = steps.map(s => `
    <a class="path-item ${s.done?'done':''}" href="${s.href||'#'}" style="text-decoration:none;">
      <span class="path-check"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></span>
      <span class="path-text"><span class="path-title">${escapeHtml(s.title)}</span><span class="path-desc">${escapeHtml(s.desc)}</span></span>
    </a>`).join('');
}
const BADGE_ICONS = {
  medal:'<svg viewBox="0 0 24 24"><circle cx="12" cy="15" r="6"/><path d="M9 10L7 3h10l-2 7"/></svg>',
  trophy:'<svg viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 4M17 5h3a3 3 0 0 1-3 4"/><path d="M12 14v3M9 20h6l-1-3H10l-1 3Z"/></svg>',
  chart:'<svg viewBox="0 0 24 24"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 15l4-5 3 3 5-7"/></svg>',
  target:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>',
  puzzle:'<svg viewBox="0 0 24 24"><path d="M14 3v3a2 2 0 0 0 2 2h3M9 21H6a2 2 0 0 1-2-2v-3M4 9V6a2 2 0 0 1 2-2h3m7 17h3a2 2 0 0 0 2-2v-3"/><circle cx="12" cy="12" r="2.5"/></svg>',
  flame:'<svg viewBox="0 0 24 24"><path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c1 1 2 2.5 2 4.5A5 5 0 0 1 7 17c0-3 1.5-4 2-6-1 0-3 1-3 3.5A7.5 7.5 0 0 0 12 22a7.5 7.5 0 0 0 7.5-7.5C19.5 8 15 6 12 2Z"/></svg>',
  star:'<svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5L18.5 21 12 16.5 5.5 21 7.5 13.5 2 9h7Z"/></svg>'
};
function renderBadges(){
  document.getElementById('badges-row').innerHTML = computeBadges().map(b => `
    <div class="hex-badge ${b.unlocked?'unlocked':''}" title="${escapeHtml(b.desc)}">
      <div class="hex">${BADGE_ICONS[b.icon]||''}</div>
      <span class="name">${escapeHtml(b.name)}</span>
    </div>`).join('');
}
function renderProfile(){
  document.getElementById('profile-name').textContent = (chessComState().username || (PROGRESS.settings||{}).chessComUsername || 'Toi');
  const level = levelFromXp(PROGRESS.xp || 0);
  const xpIntoLevel = (PROGRESS.xp || 0) % XP_PER_LEVEL;
  document.getElementById('profile-level-title').textContent = `Niveau ${level} — ${levelTitle(level)}`;
  document.getElementById('profile-xp-fill').style.width = Math.round((xpIntoLevel / XP_PER_LEVEL) * 100) + '%';

  ensureDailyProgressFresh();
  const challenge = todayChallenge();
  const current = Math.min(challenge.target, PROGRESS.dailyProgress[challenge.type] || 0);
  document.getElementById('daily-text').textContent = `${challenge.text} (${current}/${challenge.target}) — +${challenge.xp} XP`;
  document.getElementById('daily-fill').style.width = Math.round((current/challenge.target)*100) + '%';
  document.getElementById('daily-check').classList.toggle('done', PROGRESS.dailyProgress.rewardClaimed);

  const streak = computeCurrentStreak();
  document.getElementById('streak-number').textContent = streak;
  const dates = new Set(PROGRESS.activityDates || []);
  let calHtml = '';
  for(let i=27;i>=0;i--) calHtml += `<span class="streak-day ${dates.has(dateKeyOffset(i))?'active':''}"></span>`;
  document.getElementById('streak-calendar').innerHTML = calHtml;

  const totalTrainable = trainableKeys().length;
  const masteredCount = Object.keys(PROGRESS.mastered).length;
  const avgAcc = PROGRESS.games.length ? Math.round(PROGRESS.games.reduce((s,g)=>s+(g.whiteAcc+g.blackAcc)/2,0) / PROGRESS.games.length) : null;
  document.getElementById('progress-stats').innerHTML = `
    <div class="stat-card"><div class="big">${masteredCount}/${totalTrainable}</div><div class="label">Ouvertures maîtrisées</div></div>
    <div class="stat-card"><div class="big">${PROGRESS.games.length}</div><div class="label">Parties analysées</div></div>
    <div class="stat-card"><div class="big">${avgAcc!==null?avgAcc+'%':'—'}</div><div class="label">Précision moyenne</div></div>
    <div class="stat-card"><div class="big">${PROGRESS.puzzlesSolved}</div><div class="label">Puzzles résolus</div></div>`;

  renderBadges();
  renderPathList();

  document.getElementById('mastery-grid').innerHTML = trainableKeys().map(key => {
    const o = OPENINGS[key];
    const done = !!PROGRESS.mastered[key];
    return `<a class="mastery-chip ${done?'done':''}" href="openings.html?opening=${key}" style="text-decoration:none;">
      <span>${escapeHtml(o.name)}</span><span class="check ${done?'':'empty'}">${done?'\u2713':'\u25CB'}</span></a>`;
  }).join('');

  const histEl = document.getElementById('games-history');
  if(PROGRESS.games.length === 0){
    histEl.innerHTML = '<div class="history-empty">Aucune partie analysée pour l\'instant.</div>';
  } else {
    histEl.innerHTML = PROGRESS.games.map(g => {
      const d = new Date(g.date).toLocaleDateString('fr-FR');
      return `<div class="history-row"><span class="h-date">${d}</span><span>${escapeHtml(g.white)} vs ${escapeHtml(g.black)}</span><span class="h-acc">${g.whiteAcc}%</span><span class="h-acc">${g.blackAcc}%</span></div>`;
    }).join('');
  }
}
renderProfile();
</script>
</body>
</html>
