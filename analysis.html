<script>
let analysisBoard = null;
let analysisResults = [];
let analysisIndex = -1;
let analysisBoardWatching = false;
function ensureAnalysisBoard(){
  if(analysisBoard){ fitBoards('board', analysisBoard, '.page', '.eval-bar-wrap'); return; }
  analysisBoard = Chessboard('board', { position:'start', draggable:false, pieceTheme: PIECE_THEME, showNotation:false });
  renderCoords('board-ranks', 'board-files', 'white');
  fitBoards('board', analysisBoard, '.page', '.eval-bar-wrap');
  if(!analysisBoardWatching){
    watchBoardResize('board', () => analysisBoard, '.page', '.eval-bar-wrap');
    analysisBoardWatching = true;
  }
}

let fetchedGames = [];
function resultLabel(code){
  if(code === 'win') return {label:'Victoire', cls:'win'};
  if(['checkmated','resigned','timeout','abandoned','lose'].includes(code)) return {label:'Défaite', cls:'loss'};
  return {label:'Nulle', cls:'draw'};
}
function renderGamesList(games, username){
  fetchedGames = games;
  const el = document.getElementById('games-list');
  if(!games || games.length === 0){
    el.innerHTML = `<p class="section-sub">Aucune partie trouvée. Ajoute ton pseudo Chess.com dans <a href="settings.html" style="color:var(--coral);font-weight:700;">Réglages</a>.</p>`;
    return;
  }
  const uLower = (username||'').toLowerCase();
  el.innerHTML = games.map((g, idx) => {
    const isWhite = (g.white && g.white.username && g.white.username.toLowerCase() === uLower);
    const opponent = isWhite ? (g.black ? g.black.username : '?') : (g.white ? g.white.username : '?');
    const resCode = isWhite ? (g.white ? g.white.result : '') : (g.black ? g.black.result : '');
    const r = resultLabel(resCode);
    const date = g.end_time ? new Date(g.end_time * 1000).toLocaleDateString('fr-FR') : '';
    return `<div class="game-row" data-idx="${idx}">
      <span class="g-date">${date}</span><span>vs ${escapeHtml(opponent)}</span>
      <span class="g-result ${r.cls}">${r.label}</span>
      <span class="g-status checking" data-status-idx="${idx}">…</span>
    </div>`;
  }).join('');
  el.querySelectorAll('.game-row').forEach(row => { row.onclick = () => openGame(parseInt(row.dataset.idx,10)); });
  refreshStatuses(games);
}

/** Vérifie discrètement, pour chaque partie affichée, si son analyse a déjà
 *  été précalculée en arrière-plan (voir backend/analyze.js) ou non. */
async function refreshStatuses(games){
  await Promise.all(games.map(async (g, idx) => {
    const badge = document.querySelector(`[data-status-idx="${idx}"]`);
    if(!badge) return;
    const pre = g.url ? await fetchPrecomputedAnalysis(g.url) : null;
    const ready = pre && Array.isArray(pre.results) && pre.results.length;
    badge.textContent = ready ? '✓ Analysée' : 'En attente';
    badge.className = 'g-status ' + (ready ? 'ready' : 'pending');
  }));
}

/** Ouvre une partie : instantané si déjà précalculée, sinon analyse en direct (repli). */
async function openGame(idx){
  const g = fetchedGames[idx];
  if(!g) return;
  const pre = g.url ? await fetchPrecomputedAnalysis(g.url) : null;
  if(pre && Array.isArray(pre.results) && pre.results.length){
    analysisResults = pre.results;
    renderAnalysis(pre.headers || { White: g.white && g.white.username, Black: g.black && g.black.username });
    showToast('Analyse chargée', 'Déjà calculée en arrière-plan — instantané !');
  } else {
    runAnalysis(g.pgn); // repli : pas encore précalculée, analyse locale (plus lente)
  }
}

function refreshChessComUI(){
  const state = chessComState();
  const username = state.username || (PROGRESS.settings||{}).chessComUsername || '';
  renderGamesList((state.games||[]).slice(0,10), username);
}
async function initGamesList(){
  refreshChessComUI(); // affiche instantanément ce qui est déjà en cache
  const username = chessComState().username || (PROGRESS.settings||{}).chessComUsername || '';
  if(username){
    try{ await syncChessCom(username); refreshChessComUI(); }catch(e){ /* pas grave, le cache reste affiché */ }
  }
}
initGamesList();

/* Formules usuelles (façon Lichess) pour convertir une évaluation en % de gain
   et en une note de précision par coup, à partir de la perte en centipions. */
function winPercentFromCp(cp, mate){
  if(mate !== null && mate !== undefined){
    return mate > 0 ? 100 : 0;
  }
  const capped = Math.max(-1000, Math.min(1000, cp));
  return 50 + 50 * (2 / (1 + Math.exp(-0.00368208 * capped)) - 1);
}
function moveAccuracy(dropCp){
  const acc = 103.1668 * Math.exp(-0.04354 * (dropCp/100)) - 3.1669;
  return Math.max(0, Math.min(100, acc));
}
function updateEvalBar(r){
  const whiteScore = typeof r.whiteScore === 'number' ? r.whiteScore : 0;
  const whiteMate = r.whiteMate !== undefined ? r.whiteMate : null;
  const pct = winPercentFromCp(whiteScore, whiteMate);
  document.getElementById('eval-bar-black').style.height = (100 - pct) + '%';
  const label = document.getElementById('eval-bar-label');
  if(whiteMate !== null){
    label.textContent = 'M' + Math.abs(whiteMate);
  } else {
    const pawns = whiteScore / 100;
    label.textContent = (pawns >= 0 ? '+' : '') + pawns.toFixed(1);
  }
}

function adviceFor(r){
  if(r.info.cls==='best') return `${r.san} était bien le meilleur coup ici.`;
  if(r.info.cls==='good') return `${r.san} est un bon coup, proche de l'optimal (${r.bestSan}).`;
  let txt = `${r.bestSan} était plus fort. `;
  if(r.mateMissed) txt += "Ce coup menait à un mat forcé et l'a laissé passer.";
  else if(r.mateAllowed) txt += "Ce coup permet à l'adversaire de forcer le mat.";
  else if(r.info.cls==='blunder') txt += "Ce coup laisse probablement une pièce en prise ou permet une attaque décisive.";
  else if(r.info.cls==='mistake') txt += "Ce coup cède un avantage matériel ou positionnel net à l'adversaire.";
  else txt += "Léger manque de précision, la position reste globalement tenable.";
  return txt;
}
async function runAnalysis(pgn){
  const master = new Chess();
  if(!master.load_pgn(pgn, {sloppy:true})){ alert("Ce PGN n'a pas pu être lu."); return; }
  const history = master.history({verbose:true});
  if(history.length===0){ alert("Aucun coup trouvé dans ce PGN."); return; }
  document.getElementById('analysis-progress').classList.remove('hidden');
  document.getElementById('analysis-results').style.display = 'none';
  const barFill = document.getElementById('bar-fill');
  const progressLabel = document.getElementById('progress-label');
  await waitForEngineReady();
  const work = new Chess();
  const results = [];
  let evalBefore = await engineAnalyzeFEN(work.fen());
  for(let i=0;i<history.length;i++){
    const mv = history[i];
    const bestSan = evalBefore.bestMoveSan || mv.san;
    const bestScoreForMover = evalBefore.scoreForMover;
    const fenBeforeMove = work.fen();
    work.move(mv.san);
    const evalAfter = await engineAnalyzeFEN(work.fen());
    const actualScoreForMover = -evalAfter.scoreForMover;
    const drop = Math.max(0, bestScoreForMover - actualScoreForMover);
    const isBest = (bestSan === mv.san);
    const info = classify(drop, isBest);
    const whiteScore = work.turn() === 'w' ? evalAfter.scoreForMover : -evalAfter.scoreForMover;
    const whiteMate = (evalAfter.mate !== null && evalAfter.mate !== undefined)
      ? (work.turn() === 'w' ? evalAfter.mate : -evalAfter.mate) : null;
    results.push({ ply:i, color:mv.color, san:mv.san, fen: work.fen(), fenBefore: fenBeforeMove, from: mv.from, to: mv.to,
      bestSan, drop: Math.round(drop), info, whiteScore, whiteMate,
      mateMissed: evalBefore.mate !== null && evalBefore.mate > 0 && !isBest,
      mateAllowed: evalAfter.mate !== null && evalAfter.mate > 0, moveNumber: Math.floor(i/2)+1 });
    evalBefore = evalAfter;
    progressLabel.textContent = `Analyse du coup ${i+1} / ${history.length}…`;
    barFill.style.width = Math.round(((i+1)/history.length)*100) + '%';
    await new Promise(r=>setTimeout(r,0));
  }
  results.forEach(r => r.advice = adviceFor(r));
  analysisResults = results;
  document.getElementById('analysis-progress').classList.add('hidden');
  renderAnalysis(master.header());
}
function renderErrorsTab(){
  const flat = analysisResults.map((r,idx)=>({...r, idx})).filter(r => r.info.cls==='mistake' || r.info.cls==='blunder' || r.info.cls==='inaccuracy');
  const counts = {blunder:{n:0,sum:0}, mistake:{n:0,sum:0}, inaccuracy:{n:0,sum:0}};
  flat.forEach(r => { counts[r.info.cls].n++; counts[r.info.cls].sum += r.drop/100; });
  const pillLabel = {blunder:'gaffe', mistake:'erreur', inaccuracy:'imprécision'};
  let pillsHtml = '';
  ['blunder','mistake','inaccuracy'].forEach(cls => {
    if(counts[cls].n === 0) return;
    const avg = (counts[cls].sum / counts[cls].n).toFixed(2);
    const cssCls = cls === 'inaccuracy' ? 'mistake' : cls;
    pillsHtml += `<span class="error-pill ${cssCls}"><span class="ep-count">${counts[cls].n} ${pillLabel[cls]}${counts[cls].n>1?'s':''}</span><span class="ep-val">-${avg}</span></span>`;
  });
  document.getElementById('error-pills-row').innerHTML = pillsHtml || '<p class="section-sub">Aucune erreur notable sur cette partie, bravo !</p>';
  document.getElementById('error-cards').innerHTML = flat.map((r,i) => `
    <div class="error-card ${r.info.cls}">
      <div class="ec-title">Erreur ${i+1} <span style="color:var(--text-dim);font-weight:600;">−${(r.drop/100).toFixed(2)}</span></div>
      <div class="ec-desc">${r.moveNumber}${r.color==='b'?'…':'.'} ${escapeHtml(r.san)}. ${escapeHtml(r.advice)}</div>
      <div class="ec-best">Meilleur coup : ${r.moveNumber}${r.color==='b'?'…':'.'} ${escapeHtml(r.bestSan)}</div>
      <button class="btn secondary error-view-btn" data-idx="${r.idx}" style="margin-top:10px;padding:8px 14px;font-size:0.8rem;">Voir la séquence</button>
    </div>`).join('');
  document.getElementById('error-cards').querySelectorAll('.error-view-btn').forEach(btn => {
    btn.onclick = () => { document.querySelector('.analysis-tabs button[data-tab="summary"]').click(); goToPly(parseInt(btn.dataset.idx,10)); };
  });
}
document.querySelectorAll('.analysis-tabs button').forEach(btn => {
  btn.onclick = function(){
    document.querySelectorAll('.analysis-tabs button').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.analysis-tab-panel').forEach(p=>p.classList.add('hidden'));
    document.getElementById('tab-'+this.dataset.tab).classList.remove('hidden');
  };
});

function summaryLines(s){
  return `<div class="stat-line"><span>Meilleurs coups</span><span>${s.best}</span></div>
    <div class="stat-line"><span>Bons coups</span><span>${s.good}</span></div>
    <div class="stat-line"><span>Imprécisions</span><span>${s.inaccuracy}</span></div>
    <div class="stat-line"><span>Erreurs</span><span>${s.mistake}</span></div>
    <div class="stat-line"><span>Gaffes</span><span>${s.blunder}</span></div>`;
}
function renderAnalysis(headers){
  document.getElementById('analysis-results').style.display = 'block';
  document.querySelectorAll('.analysis-tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab==='summary'));
  document.querySelectorAll('.analysis-tab-panel').forEach(p=>p.classList.toggle('hidden', p.id!=='tab-summary'));
  ensureAnalysisBoard();
  const sums = {w:{best:0,good:0,inaccuracy:0,mistake:0,blunder:0}, b:{best:0,good:0,inaccuracy:0,mistake:0,blunder:0}};
  analysisResults.forEach(r => sums[r.color][r.info.cls]++);
  recordAnalyzedGame(headers, sums);
  recordMistakesFromAnalysis(headers, analysisResults);
  const white = headers.White || 'Blancs', black = headers.Black || 'Noirs';

  /* ---- Ligne d'info partie (adversaires, résultat, date, ouverture) ---- */
  const dateRaw = headers.Date || headers.UTCDate || headers.EndDate || '';
  const dateNice = dateRaw && dateRaw !== '????.??.??' ? dateRaw.replace(/\./g,'/') : '';
  const resultText = { '1-0':'1-0 — Victoire des Blancs', '0-1':'0-1 — Victoire des Noirs', '1/2-1/2':'½-½ — Nulle' }[headers.Result] || headers.Result || '';
  const whiteElo = headers.WhiteElo ? ` (${headers.WhiteElo})` : '';
  const blackElo = headers.BlackElo ? ` (${headers.BlackElo})` : '';
  const infoBits = [resultText, dateNice, headers.ECO ? `ECO ${headers.ECO}` : '', headers.TimeControl ? `Cadence ${headers.TimeControl}` : ''].filter(Boolean);
  document.getElementById('game-info-row').innerHTML = `
    <div class="gi-players"><strong>${escapeHtml(white)}${whiteElo}</strong> vs <strong>${escapeHtml(black)}${blackElo}</strong></div>
    <div class="gi-meta">${infoBits.map(escapeHtml).join(' · ')}</div>`;

  /* ---- Précision par joueur (façon chess.com) ---- */
  const accByColor = {w:[], b:[]};
  analysisResults.forEach(r => accByColor[r.color].push(moveAccuracy(r.drop)));
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 100;
  const whiteAcc = avg(accByColor.w), blackAcc = avg(accByColor.b);
  document.getElementById('accuracy-row').innerHTML = `
    <div class="acc-card"><div class="acc-label">${escapeHtml(white)}</div><div class="acc-value">${whiteAcc.toFixed(1)}%</div><div class="acc-sub">Précision</div></div>
    <div class="acc-vs">vs</div>
    <div class="acc-card"><div class="acc-label">${escapeHtml(black)}</div><div class="acc-value">${blackAcc.toFixed(1)}%</div><div class="acc-sub">Précision</div></div>`;

  document.getElementById('summary-row').innerHTML = `
    <div class="stat-card"><div class="label" style="font-weight:700;color:var(--navy);margin-bottom:8px;">${escapeHtml(white)}</div>${summaryLines(sums.w)}</div>
    <div class="stat-card"><div class="label" style="font-weight:700;color:var(--navy);margin-bottom:8px;">${escapeHtml(black)}</div>${summaryLines(sums.b)}</div>`;
  const list = document.getElementById('move-list');
  list.innerHTML = '';
  for(let i=0;i<analysisResults.length;i+=2){
    const w = analysisResults[i], b = analysisResults[i+1];
    const li = document.createElement('li');
    li.innerHTML = `<span class="num">${w.moveNumber}.</span>
      <span class="move-chip" data-idx="${w.ply}"><span class="glyph glyph-${w.info.cls}">${w.info.glyph}</span>${escapeHtml(w.san)}</span>
      ${b ? `<span class="move-chip" data-idx="${b.ply}"><span class="glyph glyph-${b.info.cls}">${b.info.glyph}</span>${escapeHtml(b.san)}</span>` : '<span></span>'}`;
    list.appendChild(li);
  }
  list.querySelectorAll('.move-chip').forEach(chip => chip.onclick = () => goToPly(parseInt(chip.dataset.idx,10)));
  renderErrorsTab();
  goToPly(analysisResults.length-1);
}
function goToPly(idx){
  if(idx < 0 || idx >= analysisResults.length) return;
  analysisIndex = idx;
  const r = analysisResults[idx];
  analysisBoard.position(r.fen);
  highlightMove('#board', r.from, r.to);
  updateEvalBar(r);
  document.querySelectorAll('.move-chip').forEach(c => c.classList.toggle('selected', parseInt(c.dataset.idx,10)===idx));
  document.getElementById('move-comment-box').innerHTML = `<span class="tag tag-${r.info.cls}">${r.info.glyph} ${r.info.label}</span>${escapeHtml(r.advice)}`;
}
document.getElementById('nav-start').onclick = () => goToPly(0);
document.getElementById('nav-prev').onclick = () => goToPly(analysisIndex-1);
document.getElementById('nav-next').onclick = () => goToPly(analysisIndex+1);
document.getElementById('nav-end').onclick = () => goToPly(analysisResults.length-1);
document.addEventListener('keydown', (e) => {
  const active = document.activeElement;
  if(active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) return;
  if(analysisResults.length === 0) return;
  if(e.key === 'ArrowLeft'){ e.preventDefault(); goToPly(analysisIndex-1); }
  else if(e.key === 'ArrowRight'){ e.preventDefault(); goToPly(analysisIndex+1); }
});
</script>
